<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>登豐肉舖 ｜ 訂貨</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --navy-mid: #243258;
    --blue: #3a6bc4;
    --blue-light: #5b8ee6;
    --pig-pink: #f5c4a8;
    --cream: #fdf6ee;
    --gold: #e8a020;
    --red: #e05050;
    --green: #3daa6e;
    --text: #1a2744;
    --border: #d0ddf0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
  }

  /* HEADER */
  .header {
    width: 100%;
    background: linear-gradient(180deg, #0f1a33 0%, var(--navy) 100%);
    padding: 24px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(58,107,196,0.25) 0%, transparent 70%);
  }
  .header-logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.15);
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }
  .header-title {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    margin-top: 4px;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  /* CARD */
  .card {
    background: var(--cream);
    border-radius: 24px;
    margin: -10px 16px 0;
    width: calc(100% - 32px);
    max-width: 480px;
    padding: 28px 24px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    position: relative;
    z-index: 2;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .field-group {
    margin-bottom: 20px;
  }
  .field-label {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .field-label .icon { font-size: 18px; }
  .field-required {
    background: var(--red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0;
  }

  input[type="text"], input[type="date"], textarea {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 17px;
    color: var(--navy);
    background: #fff;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus, textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 4px rgba(58,107,196,0.12);
  }
  input[type="date"] { font-size: 16px; cursor: pointer; }
  textarea { resize: none; min-height: 120px; line-height: 1.6; }

  /* NAME INPUT HINT */
  .name-hint {
    font-size: 12px;
    color: #888;
    margin-top: 6px;
  }

  /* DIVIDER */
  .divider {
    border: none;
    border-top: 2px dashed var(--border);
    margin: 24px 0;
  }

  /* INPUT METHOD TABS */
  .method-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .method-tab {
    flex: 1;
    padding: 10px 6px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #999;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .method-tab .tab-icon { font-size: 22px; }
  .method-tab.active {
    border-color: var(--blue);
    background: var(--blue);
    color: #fff;
  }

  /* INPUT PANELS */
  .input-panel { display: none; }
  .input-panel.active { display: block; }

  /* VOICE RECORDER */
  .voice-area {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
  }
  .record-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: none;
    background: var(--red);
    color: #fff;
    font-size: 36px;
    cursor: pointer;
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.2s;
    box-shadow: 0 4px 16px rgba(224,80,80,0.4);
  }
  .record-btn:active { transform: scale(0.93); }
  .record-btn.recording {
    background: var(--green);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 16px rgba(61,170,110,0.4); }
    50% { box-shadow: 0 4px 28px rgba(61,170,110,0.7); }
  }
  .record-status { font-size: 14px; color: #666; font-weight: 500; }
  .record-status.recording { color: var(--green); font-weight: 700; }
  .audio-preview {
    margin-top: 14px;
    width: 100%;
    border-radius: 8px;
    display: none;
  }
  .audio-preview.show { display: block; }
  .voice-note {
    font-size: 12px;
    color: #aaa;
    margin-top: 10px;
    line-height: 1.5;
  }

  /* PHOTO UPLOAD */
  .photo-area {
    background: #fff;
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 24px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    display: block;
  }
  .photo-area:hover { border-color: var(--blue); background: #f0f5ff; }
  .photo-area input[type="file"] {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0; overflow: hidden;
  }
  .photo-icon { font-size: 44px; margin-bottom: 8px; }
  .photo-text { font-size: 15px; color: #777; font-weight: 500; }
  .photo-sub { font-size: 12px; color: #aaa; margin-top: 4px; }
  .photo-preview {
    margin-top: 14px;
    max-width: 100%;
    border-radius: 10px;
    max-height: 200px;
    object-fit: cover;
    display: none;
  }
  .photo-preview.show { display: block; }

  /* SUBMIT BUTTON */
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 3px;
    cursor: pointer;
    margin-top: 28px;
    box-shadow: 0 8px 24px rgba(26,39,68,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .submit-btn:active { transform: scale(0.97); box-shadow: 0 4px 12px rgba(26,39,68,0.3); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* SUCCESS SCREEN */
  #success-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--navy);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  #success-screen.show { display: flex; }
  .success-icon {
    font-size: 80px;
    margin-bottom: 20px;
    animation: bounceIn 0.5s ease-out;
  }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .success-title {
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }
  .success-msg {
    font-size: 16px;
    color: rgba(255,255,255,0.65);
    line-height: 1.7;
    max-width: 300px;
    margin-bottom: 32px;
  }
  .success-summary {
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px 24px;
    width: 100%;
    max-width: 340px;
    text-align: left;
    margin-bottom: 32px;
  }
  .summary-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 14px;
    color: rgba(255,255,255,0.8);
  }
  .summary-row:last-child { margin-bottom: 0; }
  .summary-key { color: rgba(255,255,255,0.45); flex-shrink: 0; width: 60px; }
  .back-btn {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 36px;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  /* ERROR / LOADING */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,39,68,0.75);
    z-index: 50;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 5px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: #fff0f0;
    border: 1.5px solid #f5c0c0;
    color: var(--red);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    margin-top: 16px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* FOOTER */
  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    letter-spacing: 1px;
  }

  /* CONFIG NOTICE */
  .config-notice {
    background: rgba(232,160,32,0.15);
    border: 1.5px solid rgba(232,160,32,0.4);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .config-notice strong { font-weight: 700; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <img src="IMG_3390.jpeg" alt="登豐肉舖" class="header-logo" onerror="this.style.display='none'">
  <div class="header-title">登豐肉舖</div>
  <div class="header-sub">EST. 2008 · 新鮮直送</div>
</div>

<!-- MAIN CARD -->
<div class="card">

  <!-- CONFIG NOTICE (只在未設定時顯示，設定完可刪除) -->
  <div class="config-notice" id="config-notice">
   

  <div class="section-label">📋 填寫訂貨資料</div>

  <!-- 姓名 -->
  <div class="field-group">
    <div class="field-label">
      <span class="icon">👤</span> 您的姓名
      <span class="field-required">必填</span>
    </div>
    <input type="text" id="customer-name" placeholder="請輸入您的姓名" maxlength="20" autocomplete="name">
    <div class="name-hint">💡 第一次使用請輸入姓名，之後會自動記住</div>
  </div>

  <!-- 訂貨日期 -->
  <div class="field-group">
    <div class="field-label">
      <span class="icon">📅</span> 訂貨日期
      <span class="field-required">必填</span>
    </div>
    <input type="date" id="order-date">
  </div>

  <hr class="divider">

  <!-- 訂貨內容 -->
  <div class="field-group">
    <div class="field-label">
      <span class="icon">🥩</span> 訂貨內容
      <span class="field-required">必填</span>
    </div>

    <!-- 方式選擇 -->
    <div class="method-tabs">
      <button class="method-tab active" onclick="switchMethod('text')" id="tab-text">
        <span class="tab-icon">⌨️</span>文字
      </button>
      <button class="method-tab" onclick="switchMethod('voice')" id="tab-voice">
        <span class="tab-icon">🎙️</span>語音
      </button>
      <button class="method-tab" onclick="switchMethod('photo')" id="tab-photo">
        <span class="tab-icon">📷</span>照片
      </button>
    </div>

    <!-- 文字輸入 -->
    <div class="input-panel active" id="panel-text">
      <textarea id="text-content" placeholder="例：五花肉 1斤、排骨 半斤、豬絞肉 2斤..."></textarea>
    </div>

    <!-- 語音錄製 -->
    <div class="input-panel" id="panel-voice">
      <div class="voice-area">
        <button class="record-btn" id="record-btn" onclick="toggleRecord()">🎙️</button>
        <div class="record-status" id="record-status">按下錄音，說出您的訂貨需求</div>
        <audio class="audio-preview" id="audio-preview" controls></audio>
        <div class="voice-note">錄音完成後可以播放確認，<br>再按送出即可。</div>
      </div>
    </div>

    <!-- 照片上傳 -->
    <div class="input-panel" id="panel-photo">
      <label class="photo-area" for="photo-input">
        <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="previewPhoto(event)">
        <div class="photo-icon">📷</div>
        <div class="photo-text">點此拍照或選擇圖片</div>
        <div class="photo-sub">可拍手寫訂單或直接拍菜單</div>
        <img class="photo-preview" id="photo-preview" alt="預覽">
      </label>
    </div>
  </div>

  <div class="error-msg" id="error-msg">⚠️ 請填寫所有必填欄位</div>

  <!-- 送出按鈕 -->
  <button class="submit-btn" onclick="submitOrder()" id="submit-btn">
    📤 送出訂單
  </button>

</div>

<div class="footer">登豐肉舖 · 每日新鮮 · EST. 2008</div>

<!-- SUCCESS SCREEN -->
<div id="success-screen">
  <div class="success-icon">✅</div>
  <div class="success-title">訂單已送出！</div>
  <div class="success-msg">我們已收到您的訂貨，明天會幫您準備好！</div>
  <div class="success-summary" id="success-summary"></div>
  <button class="back-btn" onclick="resetForm()">再訂一筆</button>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div>送出中，請稍候...</div>
</div>

<script>
// =============================================
// ⚙️ 設定區：請填入您的 Apps Script 網址
// =============================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbypwcxlXLRhX1ERnqE3SEvRMzD91NxeyuEyFoCqjCRtiMBeFQxkFcTnwXrIKWmJlDsM/exec';
// =============================================

let currentMethod = 'text';
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let audioBlob = null;

// 初始化日期（預設明天）
function initDate() {
  const dateInput = document.getElementById('order-date');
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(today.getDate() + 1);
  
  const minDate = tomorrow.toISOString().split('T')[0];
  const maxDate = new Date(today.getTime() + 7 * 86400000).toISOString().split('T')[0];
  
  dateInput.min = minDate;
  dateInput.max = maxDate;
  dateInput.value = minDate;
}

// 自動帶入上次姓名
function initName() {
  const saved = localStorage.getItem('customer_name');
  if (saved) {
    document.getElementById('customer-name').value = saved;
  }
}

// 切換輸入方式
function switchMethod(method) {
  currentMethod = method;
  ['text', 'voice', 'photo'].forEach(m => {
    document.getElementById(`tab-${m}`).classList.toggle('active', m === method);
    document.getElementById(`panel-${m}`).classList.toggle('active', m === method);
  });
}

// 語音錄製
async function toggleRecord() {
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      // 自動選擇瀏覽器支援的格式（Safari 用 mp4，Chrome 用 webm）
      const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
                     : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        // 自動偵測格式，相容 Safari (mp4) 和 Chrome (webm)
        const mimeType = mediaRecorder.mimeType || 'audio/mp4';
        audioBlob = new Blob(audioChunks, { type: mimeType });
        const url = URL.createObjectURL(audioBlob);
        const preview = document.getElementById('audio-preview');
        preview.src = url;
        preview.classList.add('show');
        document.getElementById('record-status').textContent = '✅ 錄音完成！可以播放確認';
        document.getElementById('record-status').className = 'record-status';
      };
      mediaRecorder.start();
      isRecording = true;
      document.getElementById('record-btn').innerHTML = '⏹️';
      document.getElementById('record-btn').classList.add('recording');
      document.getElementById('record-status').textContent = '🔴 錄音中... 說完請再按一次';
      document.getElementById('record-status').className = 'record-status recording';
    } catch(e) {
      alert('無法使用麥克風，請確認已允許瀏覽器使用麥克風權限');
    }
  } else {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    isRecording = false;
    document.getElementById('record-btn').innerHTML = '🎙️';
    document.getElementById('record-btn').classList.remove('recording');
  }
}

// 照片預覽
function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('photo-preview');
    preview.src = e.target.result;
    preview.classList.add('show');
  };
  reader.readAsDataURL(file);
}

// 驗證並送出
async function submitOrder() {
  const name = document.getElementById('customer-name').value.trim();
  const date = document.getElementById('order-date').value;
  const errorMsg = document.getElementById('error-msg');

  // 驗證姓名與日期
  if (!name || !date) {
    errorMsg.textContent = '⚠️ 請填寫姓名和訂貨日期';
    errorMsg.classList.add('show');
    return;
  }

  // 驗證訂貨內容
  let contentType = '';
  let contentValue = '';

  if (currentMethod === 'text') {
    contentValue = document.getElementById('text-content').value.trim();
    if (!contentValue) {
      errorMsg.textContent = '⚠️ 請填寫訂貨內容';
      errorMsg.classList.add('show');
      return;
    }
    contentType = 'text';
  } else if (currentMethod === 'voice') {
    if (!audioBlob) {
      errorMsg.textContent = '⚠️ 請先錄製語音訂單';
      errorMsg.classList.add('show');
      return;
    }
    contentType = 'voice';
    contentValue = '[語音訂單]';
  } else if (currentMethod === 'photo') {
    const photoInput = document.getElementById('photo-input');
    if (!photoInput.files[0]) {
      errorMsg.textContent = '⚠️ 請先拍照或上傳圖片';
      errorMsg.classList.add('show');
      return;
    }
    contentType = 'photo';
    contentValue = '[照片訂單]';
  }

  errorMsg.classList.remove('show');

  // 儲存姓名
  localStorage.setItem('customer_name', name);

  // 顯示 loading
  document.getElementById('loading').classList.add('show');

  try {
    const formData = new FormData();
    formData.append('name', name);
    formData.append('date', date);
    formData.append('contentType', contentType);
    formData.append('contentValue', contentValue);
    formData.append('submitTime', new Date().toLocaleString('zh-TW'));

    if (contentType === 'voice' && audioBlob) {
      formData.append('audioFile', audioBlob, 'voice.webm');
    } else if (contentType === 'photo') {
      const photoInput = document.getElementById('photo-input');
      formData.append('photoFile', photoInput.files[0], 'photo.jpg');
    }

    // 若還沒設定 URL，用本地模擬
    if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      await new Promise(r => setTimeout(r, 1200)); // 模擬延遲
      showSuccess(name, date, contentType, contentValue);
      return;
    }

    const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
    const json = await res.json();

    if (json.status === 'ok') {
      showSuccess(name, date, contentType, contentValue);
    } else {
      throw new Error(json.message || '送出失敗');
    }
  } catch(e) {
    alert('送出失敗，請確認網路連線後再試\n' + e.message);
  } finally {
    document.getElementById('loading').classList.remove('show');
  }
}

function showSuccess(name, date, contentType, contentValue) {
  const typeLabel = { text: '文字', voice: '語音', photo: '照片' }[contentType];
  const dateObj = new Date(date + 'T00:00:00');
  const dateStr = `${dateObj.getMonth()+1}月${dateObj.getDate()}日`;

  document.getElementById('success-summary').innerHTML = `
    <div class="summary-row"><span class="summary-key">姓名</span><span>${name}</span></div>
    <div class="summary-row"><span class="summary-key">日期</span><span>${dateStr}</span></div>
    <div class="summary-row"><span class="summary-key">方式</span><span>${typeLabel}訂單</span></div>
    ${contentType === 'text' ? `<div class="summary-row"><span class="summary-key">內容</span><span>${contentValue}</span></div>` : ''}
  `;
  document.getElementById('success-screen').classList.add('show');
}

function resetForm() {
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('text-content').value = '';
  document.getElementById('audio-preview').classList.remove('show');
  document.getElementById('photo-preview').classList.remove('show');
  document.getElementById('record-status').textContent = '按下錄音，說出您的訂貨需求';
  document.getElementById('record-btn').innerHTML = '🎙️';
  audioBlob = null;
  document.getElementById('photo-input').value = '';
  switchMethod('text');
  initDate();
}

// 初始化
initDate();
initName();
</script>
</body>
